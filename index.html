<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Pro | Advanced Sales Protocol</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- React & Libraries via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        :root {
            --brand-green: #00FF7F;
            --brand-dark: #050505;
            --brand-dark-2: #0A0A0A;
        }

        .bg-brand-dark { background-color: var(--brand-dark); }
        .bg-brand-dark-2 { background-color: var(--brand-dark-2); }
        .text-brand-green { color: var(--brand-green); }
        .bg-brand-green { background-color: var(--brand-green); }
        .border-brand-green { border-color: var(--brand-green); }

        .glass-panel {
            @apply bg-white/5 backdrop-blur-xl border border-white/10;
        }

        .text-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        .text-shadow-glow {
            text-shadow: 0 0 20px rgba(0, 255, 127, 0.4);
        }

        ::-webkit-scrollbar {
            display: none;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#00FF7F',
                            dark: '#050505',
                            'dark-2': '#0A0A0A'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Lucide Icons Wrapper for CDN
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: icon },
                            nameAttr: 'data-lucide',
                            attrs: {
                                stroke: 'currentColor',
                                'stroke-width': strokeWidth,
                                width: size,
                                height: size,
                                class: className
                            }
                        });
                    }
                }
            }, [name, size, strokeWidth, className]);

            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const ThemeContext = createContext({
            isDark: true,
            toggleTheme: () => {},
        });

        const WHATSAPP_URL = "https://wa.me/558391438527?text=Olá!%20Vi%20seu%20SHOWCASE%20e%20gostaria%20de%20saber%20mais%20sobre%20o%20catálogo%20pro.";

                            </div>

                            >

                            </button>

                            <button className="md:hidden text-[#00FF7F] translate-x-2" onClick={() => setIsOpen(!isOpen)}>
                                {isOpen ? <Icon name="X" size={24} /> : <Icon name="Menu" size={24} />}
                            </button>

            );

                { name: "Jaqueta Jeans", price: "159.90", img: "https://images.tcdn.com.br/img/img_prod/1306644/copia_jaqueta_jeans_feminina_manga_longa_botoes_com_elastano_lavado_claro_irlandys_103_1_d54fa2060599f00bc245306a44850f8e.jpg", desc: "Estilo urbano e resistente." },
                { name: "Moletom", price: "119.90", img: "https://down-br.img.susercontent.com/file/br-11134201-23030-uf2tq9s33nova3", desc: "Ideal para dias frios, super confortável." },
                { name: "Camisa Social", price: "99.90", img: "https://images.tcdn.com.br/img/img_prod/839931/camisa_social_lisa_passa_facil_masculina_slim_fit_urban_city_2453_1_a89a0c8c871912dea4f6c077abcbee95.jpg", desc: "Elegante para qualquer ocasião." }

                    <div className="max-w-7xl mx-auto grid lg:grid-cols-12 gap-12 items-center w-full">
                        <div className="lg:col-span-6 text-center lg:text-left">
                            <h1 className={`font-display text-4xl sm:text-5xl md:text-8xl font-black leading-[0.9] mb-8 tracking-tighter uppercase italic ${isDark ? 'text-white' : 'text-slate-900'}`}>
                                Chega de <br />
                                <span className="text-[#00FF7F] text-shadow-glow">Responder</span> <br />

                            <p className={`${isDark ? 'text-white/70' : 'text-slate-600'} text-base md:text-lg mb-6 leading-relaxed max-w-lg font-bold mx-auto lg:mx-0`}>

                            </p>
                            
                            <div className="flex flex-col sm:flex-row items-center gap-4 mt-8 lg:mt-10 justify-center lg:justify-start">
                                <a href={WHATSAPP_URL} target="_blank" className="bg-[#00FF7F] text-black px-10 py-5 rounded-[24px] font-black text-xl hover:shadow-[0_0_30px_rgba(0,255,127,0.4)] transition-all uppercase tracking-tighter italic">
                                    Quero meu Catálogo Pro
                                </a>
                            </div>
                        </div>

                        <div className="lg:col-span-6 flex justify-center relative pt-0 pb-20 group">
                            <div className="absolute inset-x-0 h-full w-full bg-[#00FF7F]/5 blur-[120px] rounded-full -z-10" />
                            <div className="relative w-[320px] h-[640px] bg-black rounded-[50px] border-[8px] border-zinc-900 shadow-2xl overflow-hidden flex flex-col">
                                <div className="h-4 w-28 bg-zinc-900 absolute top-0 left-1/2 -translate-x-1/2 rounded-b-2xl z-20"></div>
                                
                                <div 
                                    className="flex-1 overflow-y-auto bg-white text-black scrollbar-hide relative"
                                    onScroll={() => setHasInteracted(true)}
                                    onTouchStart={() => setHasInteracted(true)}
                                >
                                    {!hasInteracted && (
                                        <div className="absolute inset-0 z-10 flex flex-col items-center justify-center bg-black/5 pointer-events-none">
                                            <div className="flex flex-col items-center">
                                                <Icon name="Pointer" size={64} className="text-[#00FF7F] mb-4 animate-bounce" />
                                                <span className="text-white font-black text-2xl uppercase tracking-tighter italic drop-shadow-lg text-center leading-none">
                                                    TOQUE PARA<br />NAVEGAR
                                                </span>
                                            </div>
                                        </div>
                                    )}

                                    <header className="bg-[#080E1C] py-10 px-4 text-center">
                                        <h1 className="text-white text-3xl font-bold mb-2">Minha Loja</h1>
                                        <p className="text-white/60 text-sm">Catálogo de Produtos</p>
                                    </header>

                                    <div className="grid grid-cols-1 gap-4 pb-10 p-4">
                                        {products.map((item, idx) => (
                                            <div key={idx} className="border border-slate-100 rounded-2xl overflow-hidden bg-white shadow-sm flex flex-col items-center p-4">
                                                <img src={item.img} className="w-full h-40 object-cover rounded-xl mb-4" />
                                                <h3 className="font-bold text-lg">{item.name}</h3>
                                                <p className="text-[#00FF7F] font-black text-xl">R$ {item.price}</p>
                                                <button className="mt-4 w-full bg-zinc-900 text-white rounded-xl py-2 font-bold text-sm">Adicionar</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // --- MAIN APP ---

        function App() {
            const [isDark, setIsDark] = useState(true);
            const toggleTheme = () => setIsDark(!isDark);

            return (
                <ThemeContext.Provider value={{ isDark, toggleTheme }}>
                    <div className={`min-h-screen transition-colors duration-700 ${isDark ? 'bg-brand-dark text-white' : 'bg-slate-50 text-slate-900'} overflow-x-hidden`}>
                        <Navbar />

                        {/* Seções Adicionais viriam aqui seguindo o mesmo padrão */}
                        <section id="features" className={`py-32 px-6 transition-colors duration-700 ${isDark ? 'bg-brand-dark-2' : 'bg-slate-100'}`}>
                            <div className="max-w-xl mx-auto text-center">
                                <h2 className="text-4xl font-black uppercase italic mb-8">O Futuro das Vendas no WhatsApp</h2>
                                <p className="opacity-50">Sua loja aberta 24h por dia, sem precisar que você responda um único "qual o preço?".</p>
                            </div>

                    </div>
                </ThemeContext.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
